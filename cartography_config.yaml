llm:
  # LM Studio exposes an OpenAI-compatible server. Typical default:
  #   http://localhost:1234/v1
  # You can also set these via env (recommended for secrets):
  #   LMSTUDIO_API_BASE=http://192.168.6.233:1234/v1
  #   LMSTUDIO_API_KEY_ENV=LMSTUDIO_API_KEY
  #   export/set LMSTUDIO_API_KEY=... (actual secret value)
  base_url: "http://192.168.6.233:1234/v1"
  base_url_env: "LMSTUDIO_API_BASE"
  api_key: ""
  # Reads LMSTUDIO_API_KEY_ENV and then reads that env var for the real secret.
  api_key_env: "LMSTUDIO_API_KEY_ENV"
  # Set this to the exact model name shown in LM Studio (Model tab / server logs).
  model: "google/gemma-3-27b"
  # Cost-conscious model selection:
  # - cheap_model: used for bulk work (semantic index embeddings, module annotation)
  # - expensive_model: used for synthesis (Day-One answers)
  cheap_model: "google/gemma-3-27b"
  expensive_model: "google/gemma-3-27b"
  # Embeddings model for the semantic index (POST /embeddings). Can differ from chat models.
  embedding_model: "text-embedding-multilingual-e5-large-instruct"
  # Optional vision model (if your server supports it):
  vision_model: "google/gemma-3-27b"
  temperature: 0.2
  max_tokens: 900
  timeout_s: 90

semanticist:
  enabled: true
  # Limit LLM calls for very large repos. Purpose statements still get filled
  # deterministically for all modules; LLM is used for drift/Q&A where enabled.
  max_llm_modules: 10
  doc_drift_detection: false
  day_one_answers: true
  context_budget_tokens: 2000
  # Build semantic index for Navigator find_implementation (module + function/class entries).
  semantic_index: false
  semantic_index_symbols: false

navigator:
  use_langgraph: true
  citations: true

incremental:
  enabled: false
  # Git ref range used when incremental is enabled.
  # Example: "HEAD~1..HEAD" or "main..HEAD"
  diff_range: "HEAD~1..HEAD"
